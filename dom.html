<html lang="en">
<head>

</head>
<body>
    

    <h2>check your age to cast the vote</h2>
    <form action="">
  <input type="number"placeholder="enter your age!"name="age"
  id="age">
 <input type="submit"value="submit"onclick="result()"/>
 </form>
 <script>
    function result(){
        let myAge = document.getElementBYID('age').value;
        if(myAge>=18){
            alert("eligible");
        }
        else{
            alert("not eligible");
        }
    }
 </script>
</body>
